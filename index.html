<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Notes de frais</title>
<style>
  :root{
    --ink:#1a1d1a;
    --paper:#f7f5f0;
    --paper-raised:#ffffff;
    --line:#dcd8cc;
    --fuel:#c4541d;
    --fuel-bg:#fbe9de;
    --meal:#2f6b4f;
    --meal-bg:#e3efe7;
    --muted:#7a7568;
    --danger:#b0392c;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Helvetica Neue',Arial,sans-serif;
    min-height:100vh;
    padding-bottom:90px;
  }
  .topbar{
    position:sticky;top:0;z-index:10;
    background:var(--paper);
    border-bottom:1px solid var(--line);
    padding:18px 20px 14px;
  }
  .topbar h1{
    font-family:Georgia,'Times New Roman',serif;
    font-size:22px;
    font-weight:700;
    margin:0 0 2px;
    letter-spacing:-0.01em;
  }
  .topbar .sub{
    font-size:12.5px;
    color:var(--muted);
  }
  .totals{
    display:flex;
    gap:10px;
    padding:14px 20px 4px;
  }
  .total-card{
    flex:1;
    background:var(--paper-raised);
    border:1px solid var(--line);
    border-radius:10px;
    padding:12px 14px;
  }
  .total-card.fuel{border-left:4px solid var(--fuel);}
  .total-card.meal{border-left:4px solid var(--meal);}
  .total-card .label{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.04em;
    color:var(--muted);
    margin-bottom:4px;
  }
  .total-card .amount{
    font-family:Georgia,serif;
    font-size:21px;
    font-weight:700;
    font-variant-numeric:tabular-nums;
  }
  .list{
    padding:8px 16px 20px;
  }
  .month-label{
    font-size:12px;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:0.05em;
    padding:16px 4px 8px;
  }
  .entry{
    background:var(--paper-raised);
    border:1px solid var(--line);
    border-radius:10px;
    padding:12px 14px;
    margin-bottom:8px;
    display:flex;
    align-items:center;
    gap:12px;
  }
  .entry .tag{
    width:8px;height:8px;border-radius:50%;flex-shrink:0;
  }
  .entry.fuel .tag{background:var(--fuel);}
  .entry.meal .tag{background:var(--meal);}
  .entry .info{flex:1;min-width:0;}
  .entry .info .top-row{
    display:flex;justify-content:space-between;align-items:baseline;gap:8px;
  }
  .entry .cat{
    font-size:13px;font-weight:600;
  }
  .entry.fuel .cat{color:var(--fuel);}
  .entry.meal .cat{color:var(--meal);}
  .entry .amount{
    font-family:Georgia,serif;font-size:16px;font-weight:700;
    font-variant-numeric:tabular-nums;white-space:nowrap;
  }
  .entry .meta{
    font-size:12px;color:var(--muted);margin-top:2px;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .entry .del{
    background:none;border:none;color:var(--muted);
    font-size:18px;cursor:pointer;padding:4px 6px;line-height:1;
    flex-shrink:0;
  }
  .entry .del:active{color:var(--danger);}
  .empty-state{
    text-align:center;padding:50px 30px;color:var(--muted);
  }
  .empty-state .icon{font-size:32px;margin-bottom:10px;}
  .empty-state p{font-size:14px;margin:4px 0;}

  .fab-bar{
    position:fixed;bottom:0;left:0;right:0;
    background:var(--paper-raised);
    border-top:1px solid var(--line);
    display:flex;gap:10px;
    padding:12px 16px calc(12px + env(safe-area-inset-bottom));
    z-index:20;
  }
  .fab{
    flex:1;
    border:none;border-radius:10px;
    padding:14px 0;
    font-size:13px;font-weight:600;
    display:flex;align-items:center;justify-content:center;gap:5px;
    cursor:pointer;
    white-space:nowrap;
  }
  .fab.primary{background:var(--ink);color:var(--paper);flex:1.3;}
  .fab.secondary{background:var(--paper);color:var(--ink);border:1px solid var(--line);}
  .fab:active{opacity:0.85;}

  .backup-menu{
    position:fixed;left:16px;right:16px;
    bottom:84px;
    background:var(--paper-raised);
    border:1px solid var(--line);
    border-radius:12px;
    box-shadow:0 -4px 20px rgba(0,0,0,0.12);
    z-index:25;
    overflow:hidden;
    display:none;
  }
  .backup-menu.show{display:block;}
  .backup-menu button{
    width:100%;text-align:left;
    background:none;border:none;
    padding:14px 16px;
    font-size:14px;
    border-bottom:1px solid var(--line);
    cursor:pointer;
    color:var(--ink);
  }
  .backup-menu button:last-child{border-bottom:none;}
  .backup-menu .desc{
    display:block;font-size:11.5px;color:var(--muted);margin-top:2px;font-weight:400;
  }

  /* Modal */
  .overlay{
    position:fixed;inset:0;background:rgba(26,29,26,0.45);
    z-index:30;display:none;
  }
  .overlay.show{display:block;}
  .sheet{
    position:fixed;left:0;right:0;bottom:0;
    background:var(--paper);
    border-radius:18px 18px 0 0;
    z-index:31;
    padding:18px 20px calc(20px + env(safe-area-inset-bottom));
    transform:translateY(100%);
    transition:transform 0.25s ease;
    max-height:90vh;overflow-y:auto;
  }
  .sheet.show{transform:translateY(0);}
  .sheet h2{
    font-family:Georgia,serif;font-size:19px;margin:0 0 16px;
  }
  .field{margin-bottom:14px;}
  .field label{
    display:block;font-size:12px;color:var(--muted);
    text-transform:uppercase;letter-spacing:0.04em;margin-bottom:5px;
  }
  .field input, .field select{
    width:100%;padding:11px 12px;
    border:1px solid var(--line);border-radius:8px;
    font-size:16px;background:var(--paper-raised);color:var(--ink);
    font-family:inherit;
  }
  .cat-toggle{display:flex;gap:8px;}
  .cat-btn{
    flex:1;padding:11px 0;border-radius:8px;border:1.5px solid var(--line);
    background:var(--paper-raised);font-size:14px;font-weight:600;cursor:pointer;
    color:var(--muted);
  }
  .cat-btn.active.fuel{border-color:var(--fuel);background:var(--fuel-bg);color:var(--fuel);}
  .cat-btn.active.meal{border-color:var(--meal);background:var(--meal-bg);color:var(--meal);}

  .photo-zone{
    border:1.5px dashed var(--line);border-radius:10px;
    padding:16px;text-align:center;margin-bottom:14px;
    color:var(--muted);font-size:13px;position:relative;
    background:var(--paper-raised);
  }
  .photo-zone img{
    max-width:100%;max-height:160px;border-radius:6px;display:block;margin:0 auto 8px;
  }
  .photo-zone input[type=file]{
    position:absolute;inset:0;opacity:0;cursor:pointer;
  }
  .ocr-status{font-size:12px;color:var(--meal);margin-top:6px;}

  .sheet-actions{display:flex;gap:10px;margin-top:18px;}
  .sheet-actions button{
    flex:1;padding:13px 0;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;
  }
  .btn-cancel{background:var(--paper-raised);border:1px solid var(--line);color:var(--ink);}
  .btn-save{background:var(--ink);color:var(--paper);border:none;}

  .toast{
    position:fixed;bottom:100px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:var(--paper);
    padding:10px 18px;border-radius:20px;font-size:13px;
    z-index:40;opacity:0;transition:opacity 0.2s;pointer-events:none;
  }
  .toast.show{opacity:1;}
</style>
</head>
<body>

<div class="topbar">
  <h1>Notes de frais</h1>
  <div class="sub">Carburant · Restaurant</div>
</div>

<div class="totals">
  <div class="total-card fuel">
    <div class="label">Carburant</div>
    <div class="amount" id="totalFuel">0,00 €</div>
  </div>
  <div class="total-card meal">
    <div class="label">Restaurant</div>
    <div class="amount" id="totalMeal">0,00 €</div>
  </div>
</div>

<div class="list" id="list"></div>

<div class="fab-bar">
  <button class="fab secondary" id="exportBtn">⬇ CSV</button>
  <button class="fab secondary" id="backupBtn">⇅ Sauvegarde</button>
  <button class="fab primary" id="addBtn">+ Ticket</button>
</div>
<input type="file" id="importInput" accept="application/json" style="display:none;">

<div class="backup-menu" id="backupMenu">
  <button id="doExport">
    Exporter la sauvegarde
    <span class="desc">Télécharge un fichier .json à transférer sur un autre appareil</span>
  </button>
  <button id="doImport">
    Importer une sauvegarde
    <span class="desc">Charge un fichier .json exporté depuis ton tel ou PC</span>
  </button>
</div>

<div class="overlay" id="overlay"></div>
<div class="sheet" id="sheet">
  <h2>Nouveau ticket</h2>

  <div class="field">
    <label>Catégorie</label>
    <div class="cat-toggle">
      <button type="button" class="cat-btn fuel" data-cat="fuel">⛽ Carburant</button>
      <button type="button" class="cat-btn meal" data-cat="meal">🍽 Restaurant</button>
    </div>
  </div>

  <div class="photo-zone" id="photoZone">
    <span id="photoLabel">📷 Prendre / choisir une photo du ticket</span>
    <input type="file" id="photoInput" accept="image/*" capture="environment">
  </div>
  <div class="ocr-status" id="ocrStatus"></div>

  <div class="field">
    <label>Montant (€)</label>
    <input type="number" inputmode="decimal" step="0.01" id="amountInput" placeholder="0.00">
  </div>
  <div class="field">
    <label>Date</label>
    <input type="date" id="dateInput">
  </div>
  <div class="field">
    <label>Lieu / commentaire (optionnel)</label>
    <input type="text" id="placeInput" placeholder="ex: Total Auriol">
  </div>

  <div class="sheet-actions">
    <button class="btn-cancel" id="cancelBtn">Annuler</button>
    <button class="btn-save" id="saveBtn">Enregistrer</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.1.1/tesseract.min.js"></script>
<script>
const DB_NAME = 'notesFraisDB';
const DB_VERSION = 1;
const STORE_NAME = 'tickets';
let db = null;
let entries = [];
let currentCat = 'fuel';
let currentPhotoData = null;

function openDB(){
  return new Promise((resolve, reject)=>{
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (ev)=>{
      const database = ev.target.result;
      if(!database.objectStoreNames.contains(STORE_NAME)){
        database.createObjectStore(STORE_NAME, {keyPath:'id'});
      }
    };
    req.onsuccess = (ev)=> resolve(ev.target.result);
    req.onerror = (ev)=> reject(ev.target.error);
  });
}

function fmt(n){
  return n.toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' €';
}
function fmtDate(d){
  const dt = new Date(d+'T00:00:00');
  return dt.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});
}
function monthKey(d){
  const dt = new Date(d+'T00:00:00');
  return dt.toLocaleDateString('fr-FR',{month:'long',year:'numeric'});
}

async function loadEntries(){
  try{
    if(!db) db = await openDB();
    const loaded = await new Promise((resolve, reject)=>{
      const tx = db.transaction(STORE_NAME, 'readonly');
      const store = tx.objectStore(STORE_NAME);
      const req = store.getAll();
      req.onsuccess = ()=> resolve(req.result || []);
      req.onerror = ()=> reject(req.error);
    });
    loaded.sort((a,b)=> b.date.localeCompare(a.date) || b.id.localeCompare(a.id));
    entries = loaded;
    render();
  }catch(e){
    console.error('Erreur chargement', e);
    showToast('Erreur de chargement — ' + (e.message || 'voir console'));
  }
}

async function saveEntry(entry){
  if(!db) db = await openDB();
  return new Promise((resolve, reject)=>{
    const tx = db.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).put(entry);
    tx.oncomplete = ()=> resolve();
    tx.onerror = ()=> reject(tx.error);
  });
}

async function deleteEntry(id){
  if(!db) db = await openDB();
  await new Promise((resolve, reject)=>{
    const tx = db.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).delete(id);
    tx.oncomplete = ()=> resolve();
    tx.onerror = ()=> reject(tx.error);
  });
  entries = entries.filter(e=>e.id !== id);
  render();
}

async function importEntries(newEntries){
  if(!db) db = await openDB();
  await new Promise((resolve, reject)=>{
    const tx = db.transaction(STORE_NAME, 'readwrite');
    const store = tx.objectStore(STORE_NAME);
    for(const e of newEntries){
      if(e && e.id && typeof e.amount === 'number' && e.date && e.cat){
        store.put(e);
      }
    }
    tx.oncomplete = ()=> resolve();
    tx.onerror = ()=> reject(tx.error);
  });
  await loadEntries();
}

function render(){
  const list = document.getElementById('list');
  const totalFuel = entries.filter(e=>e.cat==='fuel').reduce((s,e)=>s+e.amount,0);
  const totalMeal = entries.filter(e=>e.cat==='meal').reduce((s,e)=>s+e.amount,0);
  document.getElementById('totalFuel').textContent = fmt(totalFuel);
  document.getElementById('totalMeal').textContent = fmt(totalMeal);

  if(entries.length === 0){
    list.innerHTML = `<div class="empty-state"><div class="icon">🧾</div><p>Aucun ticket enregistré</p><p>Appuie sur "Nouveau ticket" pour commencer</p></div>`;
    return;
  }

  let html = '';
  let lastMonth = null;
  for(const e of entries){
    const mk = monthKey(e.date);
    if(mk !== lastMonth){
      html += `<div class="month-label">${mk}</div>`;
      lastMonth = mk;
    }
    const catLabel = e.cat === 'fuel' ? 'Carburant' : 'Restaurant';
    html += `
      <div class="entry ${e.cat}" data-id="${e.id}">
        <div class="tag"></div>
        <div class="info">
          <div class="top-row">
            <span class="cat">${catLabel}</span>
            <span class="amount">${fmt(e.amount)}</span>
          </div>
          <div class="meta">${fmtDate(e.date)}${e.place ? ' · ' + escapeHtml(e.place) : ''}</div>
        </div>
        <button class="del" data-id="${e.id}">✕</button>
      </div>
    `;
  }
  list.innerHTML = html;

  list.querySelectorAll('.del').forEach(btn=>{
    btn.addEventListener('click', (ev)=>{
      ev.stopPropagation();
      const id = btn.getAttribute('data-id');
      if(confirm('Supprimer ce ticket ?')) deleteEntry(id);
    });
  });
}

function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

// --- Modal logic ---
const overlay = document.getElementById('overlay');
const sheet = document.getElementById('sheet');

function openSheet(){
  currentCat = 'fuel';
  currentPhotoData = null;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('active', b.dataset.cat===currentCat));
  document.getElementById('amountInput').value = '';
  document.getElementById('placeInput').value = '';
  document.getElementById('dateInput').value = new Date().toISOString().slice(0,10);
  document.getElementById('photoLabel').textContent = '📷 Prendre / choisir une photo du ticket';
  document.getElementById('ocrStatus').textContent = '';
  document.getElementById('photoInput').value = '';
  overlay.classList.add('show');
  sheet.classList.add('show');
}
function closeSheet(){
  overlay.classList.remove('show');
  sheet.classList.remove('show');
}

document.getElementById('addBtn').addEventListener('click', openSheet);
document.getElementById('cancelBtn').addEventListener('click', closeSheet);
overlay.addEventListener('click', ()=>{ closeSheet(); closeBackupMenu(); });

// --- Backup menu (export/import JSON pour synchro tel/PC) ---
const backupMenu = document.getElementById('backupMenu');
function openBackupMenu(){ backupMenu.classList.add('show'); overlay.classList.add('show'); }
function closeBackupMenu(){ backupMenu.classList.remove('show'); overlay.classList.remove('show'); }

document.getElementById('backupBtn').addEventListener('click', openBackupMenu);

document.getElementById('doExport').addEventListener('click', ()=>{
  closeBackupMenu();
  if(entries.length === 0){
    showToast('Aucune donnée à exporter');
    return;
  }
  const json = JSON.stringify(entries, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `notes_frais_sauvegarde_${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Sauvegarde téléchargée');
});

document.getElementById('doImport').addEventListener('click', ()=>{
  closeBackupMenu();
  document.getElementById('importInput').click();
});

document.getElementById('importInput').addEventListener('change', async (ev)=>{
  const file = ev.target.files[0];
  if(!file) return;
  try{
    const text = await file.text();
    const data = JSON.parse(text);
    if(!Array.isArray(data)) throw new Error('Format invalide');
    await importEntries(data);
    showToast(`${data.length} ticket(s) importé(s)`);
  }catch(e){
    console.error(e);
    showToast('Fichier de sauvegarde invalide');
  }
  ev.target.value = '';
});

document.querySelectorAll('.cat-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    currentCat = btn.dataset.cat;
    document.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('active', b.dataset.cat===currentCat));
  });
});

document.getElementById('photoInput').addEventListener('change', async (ev)=>{
  const file = ev.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async (e)=>{
    currentPhotoData = e.target.result;
    const zone = document.getElementById('photoZone');
    document.getElementById('photoLabel').innerHTML = `<img src="${currentPhotoData}">Photo chargée — appuie pour changer`;

    const statusEl = document.getElementById('ocrStatus');
    statusEl.textContent = '🔍 Lecture du ticket en cours…';
    try{
      const result = await Tesseract.recognize(currentPhotoData, 'fra', {
        langPath: 'https://tessdata.projectnaptha.com/4.0.0',
        corePath: 'https://cdnjs.cloudflare.com/ajax/libs/tesseract.js-core/4.0.4/tesseract-core.wasm.js',
        workerPath: 'https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.1.1/worker.min.js'
      });
      const text = result.data.text;
      const amount = extractAmount(text);
      const date = extractDate(text);
      const brand = extractBrand(text);
      if(amount){
        document.getElementById('amountInput').value = amount;
      }
      if(date){
        document.getElementById('dateInput').value = date;
      }
      if(brand && !document.getElementById('placeInput').value){
        document.getElementById('placeInput').value = brand;
      }
      const parts = [];
      if(brand) parts.push(`enseigne "${brand}"`);
      if(amount) parts.push('montant');
      if(date) parts.push('date');
      statusEl.textContent = parts.length
        ? `✓ Détecté : ${parts.join(', ')} — vérifie avant d'enregistrer`
        : '⚠ Rien détecté automatiquement, complète manuellement';
    }catch(err){
      console.error('Erreur OCR complète:', err);
      const detail = (err && (err.message || err.toString())) || 'erreur inconnue';
      statusEl.textContent = `⚠ Lecture auto impossible (${detail}) — complète manuellement`;
    }
  };
  reader.readAsDataURL(file);
});

function extractAmount(text){
  // Cherche les montants type "TOTAL 23,50" ou "23.50 €" - prend le plus probable (souvent le plus grand proche de "total")
  const lines = text.split('\n');
  let candidates = [];
  const amountRegex = /(\d{1,4}[.,]\d{2})\s*€?/g;
  for(const line of lines){
    const lower = line.toLowerCase();
    let m;
    while((m = amountRegex.exec(line)) !== null){
      const val = parseFloat(m[1].replace(',','.'));
      if(val > 0 && val < 2000){
        const priority = /total|ttc|à payer|montant/.test(lower) ? 2 : 1;
        candidates.push({val, priority});
      }
    }
  }
  if(candidates.length === 0) return null;
  candidates.sort((a,b)=> b.priority - a.priority || b.val - a.val);
  return candidates[0].val.toFixed(2);
}

function extractDate(text){
  // formats type 12/06/2026 ou 12-06-26
  const m = text.match(/(\d{2})[\/\-.](\d{2})[\/\-.](\d{2,4})/);
  if(!m) return null;
  let [_, d, mo, y] = m;
  if(y.length === 2) y = '20'+y;
  const dt = new Date(`${y}-${mo}-${d}`);
  if(isNaN(dt.getTime())) return null;
  return `${y}-${mo}-${d}`;
}

// Marques connues (normalisées sans accent/casse pour le matching), avec libellé d'affichage propre
const KNOWN_BRANDS = [
  // Stations essence
  {match:'totalenergies', label:'TotalEnergies'},
  {match:'total access', label:'Total Access'},
  {match:'total', label:'Total'},
  {match:'esso', label:'Esso'},
  {match:'shell', label:'Shell'},
  {match:'bp', label:'BP'},
  {match:'avia', label:'Avia'},
  {match:'intermarche', label:'Intermarché'},
  {match:'leclerc', label:'Leclerc'},
  {match:'carrefour', label:'Carrefour'},
  {match:'auchan', label:'Auchan'},
  {match:'super u', label:'Super U'},
  {match:'station u', label:'Station U'},
  {match:'casino', label:'Casino'},
  {match:'cora', label:'Cora'},
  {match:'dyneff', label:'Dyneff'},
  // Restauration
  {match:'mcdonald', label:"McDonald's"},
  {match:'quick', label:'Quick'},
  {match:'burger king', label:'Burger King'},
  {match:'kfc', label:'KFC'},
  {match:'subway', label:'Subway'},
  {match:'flunch', label:'Flunch'},
  {match:'buffalo grill', label:'Buffalo Grill'},
  {match:'la mie caline', label:'La Mie Câline'},
  {match:'paul', label:'Paul'},
  {match:'pomme de pain', label:'Pomme de Pain'},
  {match:'starbucks', label:'Starbucks'},
  {match:'brioche doree', label:'Brioche Dorée'},
  {match:'class croute', label:"Class'Croûte"},
];

function normalize(s){
  return s.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'') // retire les accents
    .replace(/[^a-z0-9 ]/g,' ')
    .replace(/\s+/g,' ')
    .trim();
}

function extractBrand(text){
  const lines = text.split('\n').map(l=>l.trim()).filter(Boolean);
  // L'enseigne est presque toujours dans les toutes premières lignes du ticket.
  // On exclut les lignes qui ressemblent à un montant/date pour éviter les faux
  // positifs (ex: "TOTAL 42,18 €" est une ligne de montant, pas une enseigne —
  // mais "TOTALENERGIES" doit rester valide, donc on teste "total" en mot isolé).
  const isNoiseLine = (l) => /\btotal\b|\bttc\b|\d[.,]\d{2}|^\d{2}[\/\-.]\d{2}|^date\b/i.test(l);
  const headerLines = lines.filter(l => !isNoiseLine(l)).slice(0, 4);
  const header = normalize(headerLines.join(' '));

  for(const brand of KNOWN_BRANDS){
    if(header.includes(brand.match)){
      return brand.label;
    }
  }

  // Fallback : pas de marque connue détectée, on prend la première ligne "solide" du ticket
  for(const line of headerLines){
    const clean = line.replace(/[^a-zA-ZÀ-ÿ' -]/g,'').trim();
    if(clean.length >= 3 && clean.length <= 30){
      return clean;
    }
  }
  return null;
}

document.getElementById('saveBtn').addEventListener('click', async ()=>{
  const amount = parseFloat(document.getElementById('amountInput').value);
  const date = document.getElementById('dateInput').value;
  const place = document.getElementById('placeInput').value.trim();

  if(!amount || amount <= 0){
    showToast('Indique un montant valide');
    return;
  }
  if(!date){
    showToast('Indique une date');
    return;
  }

  const entry = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
    cat: currentCat,
    amount: amount,
    date: date,
    place: place
  };

  try{
    await saveEntry(entry);
    entries.unshift(entry);
    entries.sort((a,b)=> b.date.localeCompare(a.date) || b.id.localeCompare(a.id));
    render();
    closeSheet();
    showToast('Ticket enregistré ✓');
  }catch(e){
    console.error(e);
    showToast('Erreur lors de l\'enregistrement');
  }
});

// --- Export CSV ---
document.getElementById('exportBtn').addEventListener('click', ()=>{
  if(entries.length === 0){
    showToast('Aucun ticket à exporter');
    return;
  }
  let csv = 'Date;Categorie;Montant;Lieu\n';
  const sorted = [...entries].sort((a,b)=> a.date.localeCompare(b.date));
  for(const e of sorted){
    const cat = e.cat === 'fuel' ? 'Carburant' : 'Restaurant';
    const amountStr = e.amount.toFixed(2).replace('.',',');
    csv += `${fmtDate(e.date)};${cat};${amountStr};${(e.place||'').replace(/;/g,',')}\n`;
  }
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `notes_frais_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Export téléchargé');
});

loadEntries();
