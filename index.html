<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Notes de frais</title>
<style>
  :root{
    --ink:#1a1d1a;
    --paper:#f7f5f0;
    --paper-raised:#ffffff;
    --line:#dcd8cc;
    --fuel:#c4541d;
    --fuel-bg:#fbe9de;
    --meal:#2f6b4f;
    --meal-bg:#e3efe7;
    --other:#4a6076;
    --other-bg:#e4eaf0;
    --muted:#7a7568;
    --danger:#b0392c;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Helvetica Neue',Arial,sans-serif;
    min-height:100vh;
    padding-bottom:90px;
  }
  .topbar{
    position:sticky;top:0;z-index:10;
    background:var(--paper);
    border-bottom:1px solid var(--line);
    padding:18px 20px 14px;
  }
  .topbar h1{
    font-family:Georgia,'Times New Roman',serif;
    font-size:22px;
    font-weight:700;
    margin:0 0 2px;
    letter-spacing:-0.01em;
  }
  .topbar .sub{
    font-size:12.5px;
    color:var(--muted);
  }
  .totals{
    display:flex;
    gap:10px;
    padding:14px 20px 4px;
  }
  .total-card{
    flex:1;
    background:var(--paper-raised);
    border:1px solid var(--line);
    border-radius:10px;
    padding:12px 10px;
    min-width:0;
  }
  .total-card.fuel{border-left:4px solid var(--fuel);}
  .total-card.meal{border-left:4px solid var(--meal);}
  .total-card.other{border-left:4px solid var(--other);}
  .total-card .label{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.04em;
    color:var(--muted);
    margin-bottom:4px;
  }
  .total-card .amount{
    font-family:Georgia,serif;
    font-size:17px;
    font-weight:700;
    font-variant-numeric:tabular-nums;
    white-space:nowrap;
  }
  .list{
    padding:8px 16px 20px;
  }
  .month-filter{
    padding:10px 16px 0;
  }
  .month-filter select{
    width:100%;padding:10px 12px;
    border:1px solid var(--line);border-radius:8px;
    font-size:14px;background:var(--paper-raised);color:var(--ink);
    font-family:inherit;
  }
  .month-label{
    font-size:12px;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:0.05em;
    padding:16px 4px 8px;
  }
  .entry{
    background:var(--paper-raised);
    border:1px solid var(--line);
    border-radius:10px;
    padding:12px 14px;
    margin-bottom:8px;
    display:flex;
    align-items:center;
    gap:12px;
    cursor:pointer;
  }
  .entry:active{background:#f2efe8;}
  .entry .tag{
    width:8px;height:8px;border-radius:50%;flex-shrink:0;
  }
  .entry.fuel .tag{background:var(--fuel);}
  .entry.meal .tag{background:var(--meal);}
  .entry.other .tag{background:var(--other);}
  .entry .info{flex:1;min-width:0;}
  .entry .info .top-row{
    display:flex;justify-content:space-between;align-items:baseline;gap:8px;
  }
  .entry .cat{
    font-size:13px;font-weight:600;
  }
  .entry.fuel .cat{color:var(--fuel);}
  .entry.meal .cat{color:var(--meal);}
  .entry.other .cat{color:var(--other);}
  .entry .amount{
    font-family:Georgia,serif;font-size:16px;font-weight:700;
    font-variant-numeric:tabular-nums;white-space:nowrap;
  }
  .entry .meta{
    font-size:12px;color:var(--muted);margin-top:2px;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .entry .del{
    background:none;border:none;color:var(--muted);
    font-size:18px;cursor:pointer;padding:4px 6px;line-height:1;
    flex-shrink:0;
  }
  .entry .del:active{color:var(--danger);}
  .empty-state{
    text-align:center;padding:50px 30px;color:var(--muted);
  }
  .empty-state .icon{font-size:32px;margin-bottom:10px;}
  .empty-state p{font-size:14px;margin:4px 0;}

  .fab-bar{
    position:fixed;bottom:0;left:0;right:0;
    background:var(--paper-raised);
    border-top:1px solid var(--line);
    display:flex;gap:10px;
    padding:12px 16px calc(12px + env(safe-area-inset-bottom));
    z-index:20;
  }
  .fab{
    flex:1;
    border:none;border-radius:10px;
    padding:14px 0;
    font-size:13px;font-weight:600;
    display:flex;align-items:center;justify-content:center;gap:5px;
    cursor:pointer;
    white-space:nowrap;
  }
  .fab.primary{background:var(--ink);color:var(--paper);flex:1.3;}
  .fab.secondary{background:var(--paper);color:var(--ink);border:1px solid var(--line);}
  .fab:active{opacity:0.85;}

  .backup-menu{
    position:fixed;left:16px;right:16px;
    bottom:84px;
    background:var(--paper-raised);
    border:1px solid var(--line);
    border-radius:12px;
    box-shadow:0 -4px 20px rgba(0,0,0,0.12);
    z-index:32;
    overflow:hidden;
    display:none;
  }
  .backup-menu.show{display:block;}
  .backup-menu button{
    width:100%;text-align:left;
    background:none;border:none;
    padding:14px 16px;
    font-size:14px;
    border-bottom:1px solid var(--line);
    cursor:pointer;
    color:var(--ink);
  }
  .backup-menu button:last-child{border-bottom:none;}
  .backup-menu .desc{
    display:block;font-size:11.5px;color:var(--muted);margin-top:2px;font-weight:400;
  }

  /* Modal */
  .overlay{
    position:fixed;inset:0;background:rgba(26,29,26,0.45);
    z-index:30;display:none;
  }
  .overlay.show{display:block;}
  .sheet{
    position:fixed;left:0;right:0;bottom:0;
    background:var(--paper);
    border-radius:18px 18px 0 0;
    z-index:31;
    padding:18px 20px calc(20px + env(safe-area-inset-bottom));
    transform:translateY(100%);
    transition:transform 0.25s ease;
    max-height:90vh;overflow-y:auto;
  }
  .sheet.show{transform:translateY(0);}
  .sheet h2{
    font-family:Georgia,serif;font-size:19px;margin:0 0 16px;
  }
  .field{margin-bottom:14px;}
  .field label{
    display:block;font-size:12px;color:var(--muted);
    text-transform:uppercase;letter-spacing:0.04em;margin-bottom:5px;
  }
  .field input, .field select{
    width:100%;padding:11px 12px;
    border:1px solid var(--line);border-radius:8px;
    font-size:16px;background:var(--paper-raised);color:var(--ink);
    font-family:inherit;
  }
  .cat-toggle{display:flex;gap:6px;}
  .cat-btn{
    flex:1;padding:11px 2px;border-radius:8px;border:1.5px solid var(--line);
    background:var(--paper-raised);font-size:13px;font-weight:600;cursor:pointer;
    color:var(--muted);white-space:nowrap;
  }
  .cat-btn.active.fuel{border-color:var(--fuel);background:var(--fuel-bg);color:var(--fuel);}
  .cat-btn.active.meal{border-color:var(--meal);background:var(--meal-bg);color:var(--meal);}
  .cat-btn.active.other{border-color:var(--other);background:var(--other-bg);color:var(--other);}
  .cat-warning{
    display:none;
    font-size:12px;color:#9a6b1f;background:#fdf4e3;
    border:1px solid #f0dba8;border-radius:8px;
    padding:8px 10px;margin-top:8px;
  }
  .cat-warning.show{display:block;}

  .photo-zone{
    border:1.5px dashed var(--line);border-radius:10px;
    padding:16px;text-align:center;margin-bottom:14px;
    color:var(--muted);font-size:13px;position:relative;
    background:var(--paper-raised);
  }
  .photo-zone img{
    max-width:100%;max-height:160px;border-radius:6px;display:block;margin:0 auto 8px;
  }
  .photo-zone input[type=file]{
    position:absolute;inset:0;opacity:0;cursor:pointer;
  }
  .ocr-status{font-size:12px;color:var(--meal);margin-top:6px;}

  .sheet-actions{display:flex;gap:10px;margin-top:18px;}
  .sheet-actions button{
    flex:1;padding:13px 0;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;
  }
  .btn-cancel{background:var(--paper-raised);border:1px solid var(--line);color:var(--ink);}
  .btn-save{background:var(--ink);color:var(--paper);border:none;}

  .toast{
    position:fixed;bottom:100px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:var(--paper);
    padding:10px 18px;border-radius:20px;font-size:13px;
    z-index:40;opacity:0;transition:opacity 0.2s;pointer-events:none;
  }
  .toast.show{opacity:1;}
</style>
</head>
<body>

<div class="topbar">
  <h1>Notes de frais</h1>
  <div class="sub">Carburant · Restaurant · Autre</div>
</div>

<div class="totals">
  <div class="total-card fuel">
    <div class="label">Carburant</div>
    <div class="amount" id="totalFuel">0,00 €</div>
  </div>
  <div class="total-card meal">
    <div class="label">Restaurant</div>
    <div class="amount" id="totalMeal">0,00 €</div>
  </div>
  <div class="total-card other">
    <div class="label">Autre</div>
    <div class="amount" id="totalOther">0,00 €</div>
  </div>
</div>

<div class="month-filter">
  <select id="monthFilter">
    <option value="all">Tous les mois</option>
  </select>
</div>

<div class="list" id="list"></div>

<div class="fab-bar">
  <button class="fab secondary" id="exportBtn">⬇ CSV</button>
  <button class="fab secondary" id="backupBtn">⇅ Sauvegarde</button>
  <button class="fab primary" id="addBtn">+ Ticket</button>
</div>
<input type="file" id="importInput" accept="application/json" style="display:none;">

<div class="backup-menu" id="backupMenu">
  <button id="doPdf">
    📄 Exporter les justificatifs (PDF)
    <span class="desc">Un document avec la photo + les infos de chaque ticket, pour la comptabilité</span>
  </button>
  <button id="doExport">
    Exporter la sauvegarde
    <span class="desc">Télécharge un fichier .json à transférer sur un autre appareil</span>
  </button>
  <button id="doImport">
    Importer une sauvegarde
    <span class="desc">Charge un fichier .json exporté depuis ton tel ou PC</span>
  </button>
</div>

<div class="overlay" id="overlay"></div>
<div class="sheet" id="sheet">
  <h2 id="sheetTitle">Nouveau ticket</h2>

  <div class="field">
    <label>Catégorie</label>
    <div class="cat-toggle">
      <button type="button" class="cat-btn fuel" data-cat="fuel">⛽ Carburant</button>
      <button type="button" class="cat-btn meal" data-cat="meal">🍽 Restaurant</button>
      <button type="button" class="cat-btn other" data-cat="other">📦 Autre</button>
    </div>
    <div class="cat-warning" id="catWarning">⚠ Catégorie détectée automatiquement — vérifie qu'elle est correcte</div>
  </div>

  <div class="photo-zone" id="photoZone">
    <span id="photoLabel">📷 Prendre / choisir une photo du ticket</span>
    <input type="file" id="photoInput" accept="image/*" capture="environment">
  </div>
  <div class="ocr-status" id="ocrStatus"></div>

  <div class="field">
    <label>Montant (€)</label>
    <input type="number" inputmode="decimal" step="0.01" id="amountInput" placeholder="0.00">
  </div>
  <div class="field">
    <label>Date</label>
    <input type="date" id="dateInput">
  </div>
  <div class="field">
    <label>Lieu / commentaire (optionnel)</label>
    <input type="text" id="placeInput" placeholder="ex: Total Auriol">
  </div>
  <div class="field">
    <label>Adresse (optionnel)</label>
    <input type="text" id="addressInput" placeholder="ex: 13720 La Bouilladisse">
  </div>

  <button type="button" id="deleteFromEditBtn" style="display:none;width:100%;background:none;border:none;color:var(--danger);font-size:13px;padding:6px 0 12px;cursor:pointer;">🗑 Supprimer ce ticket</button>

  <div class="sheet-actions">
    <button class="btn-cancel" id="cancelBtn">Annuler</button>
    <button class="btn-save" id="saveBtn">Enregistrer</button>
  </div>
</div>

<div class="toast" id="toast"></div>


<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.1.1/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script>
const DB_NAME = 'notesFraisDB';
const DB_VERSION = 1;
const STORE_NAME = 'tickets';
let db = null;
let entries = [];
let currentCat = 'fuel';
let currentPhotoData = null;

function openDB(){
  return new Promise((resolve, reject)=>{
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (ev)=>{
      const database = ev.target.result;
      if(!database.objectStoreNames.contains(STORE_NAME)){
        database.createObjectStore(STORE_NAME, {keyPath:'id'});
      }
    };
    req.onsuccess = (ev)=> resolve(ev.target.result);
    req.onerror = (ev)=> reject(ev.target.error);
  });
}

function fmt(n){
  return n.toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' €';
}
// Libellé d'affichage d'une catégorie (centralisé pour gérer fuel/meal/other partout)
function catLabel(cat){
  if(cat === 'fuel') return 'Carburant';
  if(cat === 'meal') return 'Restaurant';
  return 'Autre';
}
function fmtDate(d){
  const dt = new Date(d+'T00:00:00');
  return dt.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});
}
function monthKey(d){
  const dt = new Date(d+'T00:00:00');
  return dt.toLocaleDateString('fr-FR',{month:'long',year:'numeric'});
}
// Clé de mois triable au format AAAA-MM (ex: "2026-06"), utilisée pour le filtre.
function monthKeyISO(d){
  return d.slice(0, 7); // les dates sont déjà au format AAAA-MM-JJ
}

async function loadEntries(){
  try{
    if(!db) db = await openDB();
    const loaded = await new Promise((resolve, reject)=>{
      const tx = db.transaction(STORE_NAME, 'readonly');
      const store = tx.objectStore(STORE_NAME);
      const req = store.getAll();
      req.onsuccess = ()=> resolve(req.result || []);
      req.onerror = ()=> reject(req.error);
    });
    loaded.sort((a,b)=> b.date.localeCompare(a.date) || b.id.localeCompare(a.id));
    entries = loaded;
    render();
  }catch(e){
    console.error('Erreur chargement', e);
    showToast('Erreur de chargement — ' + (e.message || 'voir console'));
  }
}

async function saveEntry(entry){
  if(!db) db = await openDB();
  return new Promise((resolve, reject)=>{
    const tx = db.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).put(entry);
    tx.oncomplete = ()=> resolve();
    tx.onerror = ()=> reject(tx.error);
  });
}

async function deleteEntry(id){
  if(!db) db = await openDB();
  await new Promise((resolve, reject)=>{
    const tx = db.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).delete(id);
    tx.oncomplete = ()=> resolve();
    tx.onerror = ()=> reject(tx.error);
  });
  entries = entries.filter(e=>e.id !== id);
  render();
}

async function importEntries(newEntries){
  if(!db) db = await openDB();
  await new Promise((resolve, reject)=>{
    const tx = db.transaction(STORE_NAME, 'readwrite');
    const store = tx.objectStore(STORE_NAME);
    for(const e of newEntries){
      if(e && e.id && typeof e.amount === 'number' && e.date && e.cat){
        store.put(e);
      }
    }
    tx.oncomplete = ()=> resolve();
    tx.onerror = ()=> reject(tx.error);
  });
  await loadEntries();
}

let selectedMonth = 'all'; // 'all' ou une clé AAAA-MM

function populateMonthFilter(){
  const select = document.getElementById('monthFilter');
  // Liste des mois présents dans les tickets, du plus récent au plus ancien
  const months = [...new Set(entries.map(e=>monthKeyISO(e.date)))].sort().reverse();
  const current = select.value;
  let opts = '<option value="all">Tous les mois</option>';
  for(const m of months){
    const label = monthKey(m + '-01'); // ex "juin 2026"
    opts += `<option value="${m}">${label.charAt(0).toUpperCase()+label.slice(1)}</option>`;
  }
  select.innerHTML = opts;
  // On restaure la sélection si le mois existe encore, sinon retour à "tous"
  if(current && (current === 'all' || months.includes(current))){
    select.value = current;
    selectedMonth = current;
  }else{
    select.value = 'all';
    selectedMonth = 'all';
  }
}

function render(){
  const list = document.getElementById('list');
  populateMonthFilter();

  // Entrées à afficher selon le filtre mois sélectionné
  const visible = selectedMonth === 'all'
    ? entries
    : entries.filter(e=>monthKeyISO(e.date) === selectedMonth);

  // Les totaux reflètent le périmètre affiché (mois filtré ou tout)
  const totalFuel = visible.filter(e=>e.cat==='fuel').reduce((s,e)=>s+e.amount,0);
  const totalMeal = visible.filter(e=>e.cat==='meal').reduce((s,e)=>s+e.amount,0);
  const totalOther = visible.filter(e=>e.cat==='other').reduce((s,e)=>s+e.amount,0);
  document.getElementById('totalFuel').textContent = fmt(totalFuel);
  document.getElementById('totalMeal').textContent = fmt(totalMeal);
  document.getElementById('totalOther').textContent = fmt(totalOther);

  if(entries.length === 0){
    list.innerHTML = `<div class="empty-state"><div class="icon">🧾</div><p>Aucun ticket enregistré</p><p>Appuie sur "Nouveau ticket" pour commencer</p></div>`;
    return;
  }
  if(visible.length === 0){
    list.innerHTML = `<div class="empty-state"><div class="icon">📅</div><p>Aucun ticket pour ce mois</p></div>`;
    return;
  }

  let html = '';
  let lastMonth = null;
  for(const e of visible){
    const mk = monthKey(e.date);
    if(mk !== lastMonth){
      html += `<div class="month-label">${mk}</div>`;
      lastMonth = mk;
    }
    const catName = catLabel(e.cat);
    html += `
      <div class="entry ${e.cat}" data-id="${e.id}">
        <div class="tag"></div>
        <div class="info">
          <div class="top-row">
            <span class="cat">${catName}</span>
            <span class="amount">${fmt(e.amount)}</span>
          </div>
          <div class="meta">${fmtDate(e.date)}${e.place ? ' · ' + escapeHtml(e.place) : ''}${e.photo ? ' · 📎' : ''}</div>
        </div>
        <button class="del" data-id="${e.id}">✕</button>
      </div>
    `;
  }
  list.innerHTML = html;

  list.querySelectorAll('.entry').forEach(el=>{
    el.addEventListener('click', ()=>{
      const id = el.getAttribute('data-id');
      const entry = entries.find(x=>x.id === id);
      if(entry) openSheet(entry);
    });
  });

  list.querySelectorAll('.del').forEach(btn=>{
    btn.addEventListener('click', (ev)=>{
      ev.stopPropagation();
      const id = btn.getAttribute('data-id');
      if(confirm('Supprimer ce ticket ?')) deleteEntry(id);
    });
  });
}

function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

// --- Modal logic ---
const overlay = document.getElementById('overlay');
const sheet = document.getElementById('sheet');

let editingId = null; // null = mode ajout, sinon id du ticket en cours de modification
let editingPhoto = null; // photo du ticket en cours d'édition (pour la conserver si non remplacée)

function openSheet(editEntry){
  currentPhotoData = null;
  editingPhoto = null;
  document.getElementById('photoLabel').textContent = '📷 Prendre / choisir une photo du ticket';
  document.getElementById('ocrStatus').textContent = '';
  document.getElementById('photoInput').value = '';
  document.getElementById('catWarning').classList.remove('show');

  if(editEntry && editEntry.id){
    // Mode édition : on pré-remplit avec les valeurs existantes
    editingId = editEntry.id;
    editingPhoto = editEntry.photo || null;
    currentCat = editEntry.cat;
    document.getElementById('amountInput').value = editEntry.amount;
    document.getElementById('dateInput').value = editEntry.date;
    document.getElementById('placeInput').value = editEntry.place || '';
    document.getElementById('addressInput').value = editEntry.address || '';
    document.getElementById('sheetTitle').textContent = 'Modifier le ticket';
    document.getElementById('saveBtn').textContent = 'Mettre à jour';
    document.getElementById('deleteFromEditBtn').style.display = 'block';
    // Affiche la photo justificative existante si elle est présente
    if(editingPhoto){
      document.getElementById('photoLabel').innerHTML = `<img src="${editingPhoto}">Photo du justificatif — appuie pour changer`;
    }
  }else{
    // Mode ajout : formulaire vierge
    editingId = null;
    currentCat = 'fuel';
    document.getElementById('amountInput').value = '';
    document.getElementById('dateInput').value = new Date().toISOString().slice(0,10);
    document.getElementById('placeInput').value = '';
    document.getElementById('addressInput').value = '';
    document.getElementById('sheetTitle').textContent = 'Nouveau ticket';
    document.getElementById('saveBtn').textContent = 'Enregistrer';
    document.getElementById('deleteFromEditBtn').style.display = 'none';
  }
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('active', b.dataset.cat===currentCat));
  overlay.classList.add('show');
  sheet.classList.add('show');
}
function closeSheet(){
  overlay.classList.remove('show');
  sheet.classList.remove('show');
}

document.getElementById('addBtn').addEventListener('click', ()=> openSheet());
document.getElementById('cancelBtn').addEventListener('click', closeSheet);
overlay.addEventListener('click', ()=>{ closeSheet(); closeBackupMenu(); });

// --- Backup menu (export/import JSON pour synchro tel/PC) ---
const backupMenu = document.getElementById('backupMenu');
function openBackupMenu(){ backupMenu.classList.add('show'); overlay.classList.add('show'); }
function closeBackupMenu(){ backupMenu.classList.remove('show'); overlay.classList.remove('show'); }

document.getElementById('backupBtn').addEventListener('click', openBackupMenu);

document.getElementById('doPdf').addEventListener('click', async ()=>{
  closeBackupMenu();
  if(entries.length === 0){
    showToast('Aucun ticket à exporter');
    return;
  }
  if(!window.jspdf || !window.jspdf.jsPDF){
    showToast('Librairie PDF non chargée — réessaie avec une connexion');
    return;
  }
  showToast('Génération du PDF en cours…');

  // On laisse le toast s'afficher avant le travail lourd
  await new Promise(r=>setTimeout(r, 50));

  try{
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({unit:'mm', format:'a4'});
    const pageW = 210, pageH = 297, margin = 15;

    // Tickets triés par date croissante pour un classement logique
    const sorted = [...entries].sort((a,b)=> a.date.localeCompare(b.date));
    const totalFuel = sorted.filter(e=>e.cat==='fuel').reduce((s,e)=>s+e.amount,0);
    const totalMeal = sorted.filter(e=>e.cat==='meal').reduce((s,e)=>s+e.amount,0);

    // --- Page de garde : récapitulatif ---
    doc.setFontSize(20);
    doc.text('Justificatifs de frais', margin, 30);
    doc.setFontSize(11);
    doc.setTextColor(100);
    doc.text(`Généré le ${new Date().toLocaleDateString('fr-FR')}`, margin, 38);
    doc.setTextColor(0);
    doc.setFontSize(12);
    let y = 55;
    doc.text(`Nombre de tickets : ${sorted.length}`, margin, y); y += 9;
    doc.text(`Total carburant : ${totalFuel.toLocaleString('fr-FR',{minimumFractionDigits:2})} €`, margin, y); y += 9;
    doc.text(`Total restaurant : ${totalMeal.toLocaleString('fr-FR',{minimumFractionDigits:2})} €`, margin, y); y += 9;
    doc.setFont(undefined, 'bold');
    doc.text(`Total général : ${(totalFuel+totalMeal).toLocaleString('fr-FR',{minimumFractionDigits:2})} €`, margin, y);
    doc.setFont(undefined, 'normal');

    // Petit tableau récap
    y += 14;
    doc.setFontSize(10);
    doc.setTextColor(100);
    doc.text('Date', margin, y);
    doc.text('Catégorie', margin+35, y);
    doc.text('Montant', margin+80, y);
    doc.text('Lieu', margin+110, y);
    doc.setTextColor(0);
    y += 2;
    doc.line(margin, y, pageW-margin, y);
    y += 6;
    for(const e of sorted){
      if(y > pageH - margin){ doc.addPage(); y = margin + 6; }
      const cat = catLabel(e.cat);
      doc.text(fmtDate(e.date), margin, y);
      doc.text(cat, margin+35, y);
      doc.text(`${e.amount.toLocaleString('fr-FR',{minimumFractionDigits:2})} €`, margin+80, y);
      doc.text((e.place||'-').slice(0,30), margin+110, y);
      y += 7;
    }

    // --- Une page par ticket : infos + photo ---
    let pageNum = 0;
    for(const e of sorted){
      pageNum++;
      doc.addPage();
      const cat = catLabel(e.cat);
      doc.setFontSize(14);
      doc.setFont(undefined, 'bold');
      doc.text(`Ticket ${pageNum} — ${cat}`, margin, 25);
      doc.setFont(undefined, 'normal');
      doc.setFontSize(11);
      doc.text(`Date : ${fmtDate(e.date)}`, margin, 35);
      doc.text(`Montant : ${e.amount.toLocaleString('fr-FR',{minimumFractionDigits:2})} €`, margin, 42);
      let infoY = 49;
      if(e.place){ doc.text(`Lieu : ${e.place}`, margin, infoY); infoY += 7; }
      if(e.address){ doc.text(`Adresse : ${e.address}`, margin, infoY); infoY += 7; }
      const photoTop = infoY + 2;

      if(e.photo){
        try{
          // Calcule les dimensions pour insérer la photo sans déformation
          const dims = await getImageDims(e.photo);
          const maxW = pageW - 2*margin;
          const maxH = pageH - photoTop - margin;
          let w = maxW, h = w * dims.height / dims.width;
          if(h > maxH){ h = maxH; w = h * dims.width / dims.height; }
          const x = (pageW - w) / 2;
          doc.addImage(e.photo, 'JPEG', x, photoTop, w, h);
        }catch(imgErr){
          console.error('Image non insérée:', imgErr);
          doc.setTextColor(150);
          doc.text('(photo du justificatif illisible)', margin, photoTop + 4);
          doc.setTextColor(0);
        }
      }else{
        doc.setTextColor(150);
        doc.text('(aucune photo enregistrée pour ce ticket)', margin, photoTop + 4);
        doc.setTextColor(0);
      }
    }

    doc.save(`justificatifs_frais_${new Date().toISOString().slice(0,10)}.pdf`);
    showToast('PDF généré ✓');
  }catch(err){
    console.error('Erreur génération PDF:', err);
    showToast('Erreur lors de la génération du PDF');
  }
});

function getImageDims(dataUrl){
  return new Promise((resolve, reject)=>{
    const img = new Image();
    img.onload = ()=> resolve({width: img.width, height: img.height});
    img.onerror = reject;
    img.src = dataUrl;
  });
}

document.getElementById('photoInput').addEventListener('change', async (ev)=>{
  const file = ev.target.files[0];
  if(!file) return;
  const statusEl = document.getElementById('ocrStatus');
  statusEl.textContent = '🔍 Préparation de la photo…';
  try{
    // On compresse la photo dès le chargement : elle sert à la fois pour l'OCR
    // et comme justificatif stocké. La compression réduit fortement la taille
    // (un scan iPhone fait plusieurs Mo, on descend à ~100-300 Ko) pour que
    // la base locale et les exports restent légers.
    currentPhotoData = await compressImage(file, 1400, 0.7);
  }catch(err){
    console.error('Compression échouée, on garde l\'original:', err);
    currentPhotoData = await readFileAsDataURL(file);
  }
  document.getElementById('photoLabel').innerHTML = `<img src="${currentPhotoData}">Photo chargée — appuie pour changer`;

  {
    statusEl.textContent = '🔍 Lecture du ticket en cours…';
    let lastKnownStep = 'initialisation';
    try{
      const result = await Tesseract.recognize(currentPhotoData, 'fra', {
        logger: (m)=>{
          // m.status donne l'étape en cours côté Tesseract (loading tesseract core,
          // initializing tesseract, loading language traineddata, recognizing text...)
          if(m && m.status){
            lastKnownStep = m.status;
            statusEl.textContent = `🔍 ${translateStep(m.status)}…`;
          }
        }
      });
      const text = result.data.text;
      const amount = extractAmount(text);
      const date = extractDate(text);
      const brand = extractBrand(text);
      const fuelType = extractFuelType(text);
      const address = extractAddress(text);
      if(amount){
        document.getElementById('amountInput').value = amount;
      }
      if(date){
        document.getElementById('dateInput').value = date;
      }
      // Construit le commentaire à partir de l'enseigne et/ou du type de carburant
      // détectés (ex: "TotalEnergies — Diesel"). On ne remplit que si l'utilisateur
      // n'a pas déjà écrit quelque chose dans le champ.
      if(!document.getElementById('placeInput').value){
        const commentParts = [];
        if(brand.label) commentParts.push(brand.label);
        if(fuelType) commentParts.push(fuelType);
        if(commentParts.length){
          document.getElementById('placeInput').value = commentParts.join(' — ');
        }
      }
      // Remplit l'adresse détectée (CP + ville, et rue si lisible)
      if(address && !document.getElementById('addressInput').value){
        document.getElementById('addressInput').value = address;
      }
      // Pré-coche automatiquement la catégorie si l'enseigne détectée est connue
      // (carburant ou restaurant) — l'utilisateur doit vérifier avant d'enregistrer,
      // donc on affiche un badge d'avertissement qui ne disparaît qu'à son clic manuel.
      // Si on a détecté un type de carburant (diesel/essence), c'est forcément du carburant.
      const detectedCat = brand.cat || (fuelType ? 'fuel' : null);
      if(detectedCat){
        currentCat = detectedCat;
        document.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('active', b.dataset.cat===currentCat));
        document.getElementById('catWarning').classList.add('show');
      }
      const parts = [];
      if(brand.label) parts.push(`enseigne "${brand.label}"`);
      if(fuelType) parts.push(`carburant "${fuelType}"`);
      if(address) parts.push('adresse');
      if(detectedCat) parts.push(`catégorie ${catLabel(detectedCat)} pré-sélectionnée`);
      if(amount) parts.push('montant');
      if(date) parts.push('date');
      statusEl.textContent = parts.length
        ? `✓ Détecté : ${parts.join(', ')} — vérifie avant d'enregistrer`
        : '⚠ Rien détecté automatiquement, complète manuellement';
    }catch(err){
      console.error('Erreur OCR complète:', err, '— dernière étape connue:', lastKnownStep);
      const detail = (err && (err.message || err.toString())) || 'erreur inconnue';
      statusEl.innerHTML = `⚠ Échec pendant l'étape <b>"${lastKnownStep}"</b> (${detail}) — complète manuellement.<br><span style="font-size:11px;">La photo est quand même conservée comme justificatif.</span>`;
    }
  }
});

function readFileAsDataURL(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = (e)=> resolve(e.target.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// Compresse une image : redimensionne pour que le plus grand côté <= maxSize,
// et réencode en JPEG avec la qualité donnée. Retourne un data URL.
async function compressImage(file, maxSize, quality){
  const dataUrl = await readFileAsDataURL(file);
  return new Promise((resolve, reject)=>{
    const img = new Image();
    img.onload = ()=>{
      let {width, height} = img;
      if(width > height && width > maxSize){
        height = Math.round(height * maxSize / width);
        width = maxSize;
      }else if(height >= width && height > maxSize){
        width = Math.round(width * maxSize / height);
        height = maxSize;
      }
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = reject;
    img.src = dataUrl;
  });
}

function translateStep(status){
  const map = {
    'loading tesseract core': 'Chargement du moteur OCR',
    'initializing tesseract': 'Initialisation',
    'loading language traineddata': 'Téléchargement du modèle français',
    'initializing api': 'Préparation',
    'recognizing text': 'Analyse du ticket'
  };
  return map[status] || status;
}

function extractAmount(text){
  // Cherche les montants type "TOTAL 23,50", "23.50 €", ou "1 234,56" (avec
  // séparateur de milliers). Prend le plus probable (souvent proche de "total").
  // On normalise d'abord les espaces fines/insécables utilisées comme séparateurs
  // de milliers pour ne pas casser la lecture (ex: "1 234,56" -> "1234,56").
  const lines = text.replace(/[\u00a0\u202f]/g, ' ').split('\n');
  let candidates = [];
  // Capture un nombre avec séparateur de milliers optionnel (espace ou point)
  // suivi d'une partie décimale à 2 chiffres : 1 234,56 / 1.234,56 / 234,56 / 23.50
  const amountRegex = /(\d{1,3}(?:[ .]\d{3})*[.,]\d{2})\s*€?/g;
  for(const line of lines){
    const lower = line.toLowerCase();
    let m;
    while((m = amountRegex.exec(line)) !== null){
      // Nettoyage : retire les séparateurs de milliers, garde le dernier séparateur
      // décimal. On supprime espaces, puis on traite le séparateur décimal final.
      let raw = m[1].replace(/ /g, '');
      // Si le format est "1.234,56" (point=milliers, virgule=décimal) -> on enlève les points
      if(/,\d{2}$/.test(raw)){
        raw = raw.replace(/\./g, '').replace(',', '.');
      }else{
        // format "1,234.50" (rare en France) ou "234.56" -> on enlève les virgules
        raw = raw.replace(/,/g, '');
      }
      const val = parseFloat(raw);
      if(val > 0 && val < 10000){
        const priority = /total|ttc|à payer|montant/.test(lower) ? 2 : 1;
        candidates.push({val, priority});
      }
    }
  }
  if(candidates.length === 0) return null;
  candidates.sort((a,b)=> b.priority - a.priority || b.val - a.val);
  return candidates[0].val.toFixed(2);
}

function extractDate(text){
  // formats type 12/06/2026 ou 12-06-26
  const m = text.match(/(\d{2})[\/\-.](\d{2})[\/\-.](\d{2,4})/);
  if(!m) return null;
  let [_, d, mo, y] = m;
  if(y.length === 2) y = '20'+y;
  const dt = new Date(`${y}-${mo}-${d}`);
  if(isNaN(dt.getTime())) return null;
  return `${y}-${mo}-${d}`;
}

// Marques connues (normalisées sans accent/casse pour le matching), avec libellé d'affichage propre
// et catégorie associée (fuel = carburant, meal = restaurant) pour pré-cocher la catégorie.
const KNOWN_BRANDS = [
  // Stations essence
  {match:'totalenergies', label:'TotalEnergies', cat:'fuel'},
  {match:'total access', label:'Total Access', cat:'fuel'},
  {match:'total', label:'Total', cat:'fuel'},
  {match:'esso', label:'Esso', cat:'fuel'},
  {match:'shell', label:'Shell', cat:'fuel'},
  {match:'bp', label:'BP', cat:'fuel'},
  {match:'avia', label:'Avia', cat:'fuel'},
  {match:'intermarche', label:'Intermarché', cat:'fuel'},
  {match:'leclerc', label:'Leclerc', cat:'fuel'},
  {match:'carrefour', label:'Carrefour', cat:'fuel'},
  {match:'auchan', label:'Auchan', cat:'fuel'},
  {match:'super u', label:'Super U', cat:'fuel'},
  {match:'station u', label:'Station U', cat:'fuel'},
  {match:'casino', label:'Casino', cat:'fuel'},
  {match:'cora', label:'Cora', cat:'fuel'},
  {match:'dyneff', label:'Dyneff', cat:'fuel'},
  // Restauration
  {match:'mcdonald', label:"McDonald's", cat:'meal'},
  {match:'quick', label:'Quick', cat:'meal'},
  {match:'burger king', label:'Burger King', cat:'meal'},
  {match:'kfc', label:'KFC', cat:'meal'},
  {match:'subway', label:'Subway', cat:'meal'},
  {match:'flunch', label:'Flunch', cat:'meal'},
  {match:'buffalo grill', label:'Buffalo Grill', cat:'meal'},
  {match:'la mie caline', label:'La Mie Câline', cat:'meal'},
  {match:'paul', label:'Paul', cat:'meal'},
  {match:'pomme de pain', label:'Pomme de Pain', cat:'meal'},
  {match:'starbucks', label:'Starbucks', cat:'meal'},
  {match:'brioche doree', label:'Brioche Dorée', cat:'meal'},
  {match:'class croute', label:"Class'Croûte", cat:'meal'},
];

function normalize(s){
  return s.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'') // retire les accents
    .replace(/[^a-z0-9 ]/g,' ')
    .replace(/\s+/g,' ')
    .trim();
}

function extractBrand(text){
  const lines = text.split('\n').map(l=>l.trim()).filter(Boolean);
  // L'enseigne est presque toujours dans les toutes premières lignes du ticket.
  // On exclut les lignes qui ressemblent à un montant/date pour éviter les faux
  // positifs (ex: "TOTAL 42,18 €" est une ligne de montant, pas une enseigne —
  // mais "TOTALENERGIES" doit rester valide, donc on teste "total" en mot isolé).
  const isNoiseLine = (l) => /\btotal\b|\bttc\b|\d[.,]\d{2}|^\d{2}[\/\-.]\d{2}|^date\b/i.test(l);
  const headerLines = lines.filter(l => !isNoiseLine(l)).slice(0, 4);
  const header = normalize(headerLines.join(' '));

  for(const brand of KNOWN_BRANDS){
    if(brand.match.length <= 3){
      // Marques courtes (BP, KFC, Cora...) : on exige une correspondance en MOT
      // ENTIER pour éviter les faux positifs (ex: "bp" trouvé au milieu d'un mot).
      const wordRegex = new RegExp(`\\b${brand.match}\\b`);
      if(wordRegex.test(header)){
        return {label: brand.label, cat: brand.cat};
      }
    }else{
      if(header.includes(brand.match)){
        return {label: brand.label, cat: brand.cat};
      }
    }
  }

  // Fallback : pas de marque connue détectée, on prend la première ligne "plausible"
  // du ticket. On vérifie que ça ressemble à du vrai texte (assez de lettres,
  // pas trop de symboles bizarres) pour éviter d'afficher du charabia issu
  // d'un OCR raté sur un logo ou un en-tête flou.
  for(const line of headerLines){
    const clean = line.replace(/[^a-zA-ZÀ-ÿ' -]/g,'').trim();
    if(clean.length < 3 || clean.length > 30) continue;
    // Un OCR raté sur un logo/en-tête flou produit souvent une accumulation
    // anormale de lettres accentuées (Â, Ë, Ï...) qu'un vrai nom d'enseigne
    // français n'a presque jamais. On compte les lettres ASCII simples
    // séparément des lettres accentuées pour détecter ce signal de bruit.
    const asciiLetters = (clean.match(/[a-zA-Z]/g) || []).length;
    const accentedLetters = (clean.match(/[À-ÿ]/g) || []).length;
    const totalLetters = asciiLetters + accentedLetters;
    const looksPlausible =
      totalLetters / clean.length > 0.7 &&   // assez de lettres, peu de symboles
      accentedLetters <= 2 &&                // un nom français a rarement plus de 2 accents
      /[aeiouyAEIOUY]/.test(clean);          // contient au moins une vraie voyelle simple
    if(looksPlausible){
      return {label: clean, cat: null};
    }
  }
  return {label: null, cat: null};
}

// Détecte le type de carburant mentionné sur le ticket et renvoie un libellé
// propre (Diesel ou Essence). On couvre les appellations courantes des stations
// françaises : gazole/diesel/GO d'un côté, SP95/SP98/E10/E85/sans plomb de l'autre.
function extractFuelType(text){
  const t = normalize(text);
  // Diesel / gazole
  if(/\b(diesel|gazole|gasoil|gas oil)\b/.test(t) || /\bgo\b/.test(t)){
    return 'Diesel';
  }
  // Essence (sans plomb, SP95, SP98, E10, E85...)
  if(/\b(essence|sans plomb|sp ?95|sp ?98|e10|e85|sp95 e10|excellium)\b/.test(t)){
    return 'Essence';
  }
  return null;
}

// Détecte une adresse sur le ticket. Le repère le plus fiable est le code postal
// français (5 chiffres) souvent suivi de la ville. On essaie de récupérer la ligne
// du code postal (CP + ville), et si possible la ligne de rue juste au-dessus.
function extractAddress(text){
  const lines = text.split('\n').map(l=>l.trim()).filter(Boolean);
  // Cherche une ligne contenant un code postal français (01000–98999) + ville
  const cpRegex = /\b(0[1-9]|[1-9]\d)\d{3}\b/;
  let cpIndex = -1;
  for(let i=0; i<lines.length; i++){
    if(cpRegex.test(lines[i])){
      // On évite de confondre avec un numéro de téléphone ou de TVA :
      // une ligne d'adresse contient généralement aussi des lettres (la ville).
      if(/[a-zA-ZÀ-ÿ]/.test(lines[i])){
        cpIndex = i;
        break;
      }
    }
  }
  if(cpIndex === -1) return null;

  // Nettoie la ligne CP+ville (retire les caractères parasites en début/fin)
  const cpLine = lines[cpIndex].replace(/[^0-9a-zA-ZÀ-ÿ '-]/g, ' ').replace(/\s+/g,' ').trim();

  // Essaie d'ajouter la ligne précédente si elle ressemble à une rue
  // (contient un numéro et/ou un mot-clé de voie).
  let streetLine = '';
  if(cpIndex > 0){
    const prev = lines[cpIndex-1];
    if(/\d/.test(prev) && /[a-zA-ZÀ-ÿ]/.test(prev) &&
       /\b(rue|avenue|av|bd|boulevard|chemin|route|rte|place|impasse|allee|allée|quai|cours|zone|za|zi|rn|cd)\b/i.test(normalize(prev))){
      streetLine = prev.replace(/[^0-9a-zA-ZÀ-ÿ '-]/g, ' ').replace(/\s+/g,' ').trim();
    }
  }

  const full = (streetLine ? streetLine + ', ' : '') + cpLine;
  // Garde-fou : si le résultat est trop court ou trop long, on s'abstient
  if(full.length < 5 || full.length > 80) return cpLine.length >= 5 ? cpLine : null;
  return full;
}

document.getElementById('saveBtn').addEventListener('click', async ()=>{
  const amount = parseFloat(document.getElementById('amountInput').value);
  const date = document.getElementById('dateInput').value;
  const place = document.getElementById('placeInput').value.trim();
  const address = document.getElementById('addressInput').value.trim();

  if(!amount || amount <= 0){
    showToast('Indique un montant valide');
    return;
  }
  if(!date){
    showToast('Indique une date');
    return;
  }

  // Si la catégorie a été pré-sélectionnée automatiquement par l'OCR et que
  // l'utilisateur n'a pas cliqué manuellement pour confirmer, on lui demande
  // explicitement de valider avant d'enregistrer (plutôt que de compter sur
  // le seul badge visuel, qui peut être manqué).
  if(document.getElementById('catWarning').classList.contains('show')){
    const catName = catLabel(currentCat);
    const confirmed = confirm(`Catégorie détectée automatiquement : "${catName}".\n\nConfirmer cette catégorie ?`);
    if(!confirmed){
      return; // l'utilisateur reste sur le formulaire pour corriger manuellement
    }
    document.getElementById('catWarning').classList.remove('show');
  }

  const entry = {
    id: editingId || (Date.now().toString(36) + Math.random().toString(36).slice(2,6)),
    cat: currentCat,
    amount: amount,
    date: date,
    place: place,
    address: address,
    // Photo justificative : la nouvelle si on en a pris une, sinon celle déjà
    // associée au ticket en édition (pour ne pas la perdre lors d'une modif).
    photo: currentPhotoData || editingPhoto || null
  };

  try{
    await saveEntry(entry);
    if(editingId){
      // Mise à jour : on remplace l'entrée existante dans le tableau en mémoire
      const idx = entries.findIndex(e=>e.id === editingId);
      if(idx !== -1) entries[idx] = entry; else entries.unshift(entry);
    }else{
      entries.unshift(entry);
    }
    entries.sort((a,b)=> b.date.localeCompare(a.date) || b.id.localeCompare(a.id));
    render();
    closeSheet();
    showToast(editingId ? 'Ticket mis à jour ✓' : 'Ticket enregistré ✓');
    editingId = null;
    editingPhoto = null;
  }catch(e){
    console.error(e);
    showToast('Erreur lors de l\'enregistrement');
  }
});

document.getElementById('deleteFromEditBtn').addEventListener('click', async ()=>{
  if(!editingId) return;
  if(confirm('Supprimer ce ticket ?')){
    await deleteEntry(editingId);
    editingId = null;
    closeSheet();
  }
});

// --- Export CSV ---
document.getElementById('exportBtn').addEventListener('click', ()=>{
  if(entries.length === 0){
    showToast('Aucun ticket à exporter');
    return;
  }
  let csv = 'Date;Categorie;Montant;Lieu;Adresse\n';
  const sorted = [...entries].sort((a,b)=> a.date.localeCompare(b.date));
  for(const e of sorted){
    const cat = catLabel(e.cat);
    const amountStr = e.amount.toFixed(2).replace('.',',');
    csv += `${fmtDate(e.date)};${cat};${amountStr};${(e.place||'').replace(/;/g,',')};${(e.address||'').replace(/;/g,',')}\n`;
  }
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `notes_frais_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Export téléchargé');
});

document.getElementById('monthFilter').addEventListener('change', (ev)=>{
  selectedMonth = ev.target.value;
  render();
});

loadEntries();
</script>
</body>
</html>
